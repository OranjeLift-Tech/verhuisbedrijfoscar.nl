<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="spBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#spBg)"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- House shape -->
  <g transform="translate(50, 48)" fill="white">
    <!-- House body -->
    <rect x="-18" y="-4" width="36" height="26" rx="2" opacity="0.95"/>
    <!-- Roof -->
    <polygon points="-22,-4 0,-20 22,-4" fill="white" opacity="0.95"/>
    <!-- Roof ridge line -->
    <line x1="-22" y1="-4" x2="22" y2="-4" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <!-- Door -->
    <rect x="-5" y="8" width="10" height="18" rx="1.5" fill="#1E40AF"/>
    <circle cx="3" cy="17" r="1" fill="#FCD34D"/>
    <!-- Window left -->
    <rect x="-15" y="2" width="8" height="8" rx="1" fill="#93C5FD" opacity="0.7"/>
    <line x1="-11" y1="2" x2="-11" y2="10" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <line x1="-15" y1="6" x2="-7" y2="6" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <!-- Window right -->
    <rect x="7" y="2" width="8" height="8" rx="1" fill="#93C5FD" opacity="0.7"/>
    <line x1="11" y1="2" x2="11" y2="10" stroke="white" stroke-width="0.5" opacity="0.5"/>
    <line x1="7" y1="6" x2="15" y2="6" stroke="white" stroke-width="0.5" opacity="0.5"/>
  </g>
  <!-- Moving arrow -->
  <g transform="translate(50, 48)">
    <!-- Curved arrow from left side going right -->
    <path d="M-30,10 Q-30,-15 -5,-22" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="-5,-22 -12,-20 -8,-27" fill="#10B981"/>
  </g>
</svg>