<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Moving truck icon -->
  <g transform="translate(4, 6)">
    <!-- Truck cargo body -->
    <rect x="0" y="8" width="24" height="18" rx="2" fill="#1E40AF"/>
    <!-- Cargo door lines -->
    <line x1="8" y1="10" x2="8" y2="24" stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="16" y1="10" x2="16" y2="24" stroke="white" stroke-width="0.8" opacity="0.4"/>
    <!-- Truck cabin -->
    <path d="M24,14 L32,14 L36,20 L36,26 L24,26 Z" fill="#059669"/>
    <!-- Cabin window -->
    <path d="M25.5,15.5 L30,15.5 L33,20 L25.5,20 Z" fill="white" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="8" cy="28.5" r="3.5" fill="#1E3A5F"/>
    <circle cx="8" cy="28.5" r="1.5" fill="white"/>
    <circle cx="30" cy="28.5" r="3.5" fill="#1E3A5F"/>
    <circle cx="30" cy="28.5" r="1.5" fill="white"/>
    <!-- Ground line -->
    <line x1="0" y1="32" x2="38" y2="32" stroke="#059669" stroke-width="1" opacity="0.5"/>
    <!-- Motion lines -->
    <line x1="-4" y1="14" x2="-1" y2="14" stroke="#1E40AF" stroke-width="1" opacity="0.5"/>
    <line x1="-6" y1="18" x2="-1" y2="18" stroke="#1E40AF" stroke-width="1" opacity="0.4"/>
    <line x1="-4" y1="22" x2="-1" y2="22" stroke="#1E40AF" stroke-width="1" opacity="0.3"/>
    <!-- Arrow on cargo (representing moving) -->
    <path d="M5,16 L11,16 L11,13.5 L15,17.5 L11,21.5 L11,19 L5,19 Z" fill="white" opacity="0.6"/>
  </g>

  <!-- Text group -->
  <g transform="translate(50, 0)">
    <!-- "Verhuisbedrijf" small text above -->
    <text x="0" y="17" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="500" fill="#059669" letter-spacing="2">VERHUISBEDRIJF</text>
    <!-- "Oscar" main text -->
    <text x="0" y="38" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#1E40AF" letter-spacing="1">Oscar</text>
    <!-- Accent underline -->
    <rect x="0" y="41" width="50" height="2.5" rx="1.25" fill="url(#truckGrad)"/>
  </g>
</svg>