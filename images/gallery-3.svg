<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="g3sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="70%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="g3house" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F4"/>
      <stop offset="100%" stop-color="#E7E5E4"/>
    </linearGradient>
    <linearGradient id="g3roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="g3grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g3door" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="300" fill="url(#g3sky)" rx="8"/>
  <!-- Sun -->
  <circle cx="340" cy="45" r="28" fill="#FCD34D" opacity="0.6"/>
  <circle cx="340" cy="45" r="22" fill="#FBBF24"/>
  <!-- Sun rays -->
  <g stroke="#FCD34D" stroke-width="2" opacity="0.4">
    <line x1="340" y1="10" x2="340" y2="18"/>
    <line x1="370" y1="25" x2="376" y2="20"/>
    <line x1="375" y1="50" x2="383" y2="50"/>
    <line x1="365" y1="72" x2="372" y2="78"/>
    <line x1="310" y1="72" x2="303" y2="78"/>
    <line x1="305" y1="50" x2="297" y2="50"/>
    <line x1="312" y1="22" x2="306" y2="16"/>
  </g>
  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <ellipse cx="70" cy="40" rx="35" ry="14"/>
    <ellipse cx="50" cy="36" rx="20" ry="10"/>
    <ellipse cx="95" cy="37" rx="22" ry="10"/>
    <ellipse cx="220" cy="30" rx="28" ry="12"/>
    <ellipse cx="200" cy="26" rx="18" ry="9"/>
  </g>
  <!-- Grass -->
  <rect x="0" y="210" width="400" height="90" fill="url(#g3grass)" rx="0"/>
  <!-- Path to house -->
  <path d="M200,300 Q200,260 200,230 Q200,215 190,210" fill="none" stroke="#D1D5DB" stroke-width="30" opacity="0.6"/>
  <path d="M200,300 Q200,260 200,230 Q200,215 190,210" fill="none" stroke="#E5E7EB" stroke-width="24" opacity="0.5"/>
  <!-- House -->
  <g transform="translate(100, 70)">
    <!-- Main structure -->
    <rect x="20" y="60" width="160" height="100" fill="url(#g3house)" rx="2"/>
    <!-- Roof -->
    <polygon points="-5,62 100,0 205,62" fill="url(#g3roof)"/>
    <polygon points="5,62 100,8 195,62" fill="#2563EB" opacity="0.3"/>
    <!-- Chimney -->
    <rect x="140" y="15" width="20" height="35" fill="#78716C" rx="2"/>
    <rect x="136" y="12" width="28" height="6" fill="#6B7280" rx="2"/>
    <!-- Door -->
    <rect x="75" y="95" width="45" height="65" fill="url(#g3door)" rx="4"/>
    <circle cx="110" cy="130" r="3" fill="#FCD34D"/>
    <!-- Doorstep -->
    <rect x="70" y="157" width="55" height="5" fill="#9CA3AF" rx="1"/>
    <!-- Windows -->
    <rect x="32" y="80" width="32" height="32" fill="#BFDBFE" rx="3" stroke="white" stroke-width="2"/>
    <line x1="48" y1="80" x2="48" y2="112" stroke="white" stroke-width="2"/>
    <line x1="32" y1="96" x2="64" y2="96" stroke="white" stroke-width="2"/>
    <rect x="135" y="80" width="32" height="32" fill="#BFDBFE" rx="3" stroke="white" stroke-width="2"/>
    <line x1="151" y1="80" x2="151" y2="112" stroke="white" stroke-width="2"/>
    <line x1="135" y1="96" x2="167" y2="96" stroke="white" stroke-width="2"/>
    <!-- Window curtains hint -->
    <rect x="33" y="81" width="6" height="30" fill="#FDE68A" opacity="0.4" rx="1"/>
    <rect x="136" y="81" width="6" height="30" fill="#FDE68A" opacity="0.4" rx="1"/>
    <!-- Attic window -->
    <circle cx="100" cy="38" r="12" fill="#BFDBFE" stroke="white" stroke-width="2"/>
    <line x1="100" y1="26" x2="100" y2="50" stroke="white" stroke-width="1.5"/>
    <line x1="88" y1="38" x2="112" y2="38" stroke="white" stroke-width="1.5"/>
  </g>
  <!-- Bushes around house -->
  <g>
    <ellipse cx="108" cy="218" rx="20" ry="14" fill="#059669"/>
    <ellipse cx="125" cy="215" rx="16" ry="12" fill="#10B981"/>
    <ellipse cx="290" cy="218" rx="22" ry="14" fill="#059669"/>
    <ellipse cx="275" cy="215" rx="15" ry="11" fill="#10B981"/>
  </g>
  <!-- Family -->
  <!-- Dad -->
  <g transform="translate(150, 180)">
    <!-- Legs -->
    <rect x="4" y="45" width="8" height="28" fill="#374151" rx="3"/>
    <rect x="18" y="45" width="8" height="28" fill="#374151" rx="3"/>
    <rect x="2" y="70" width="12" height="6" fill="#1F2937" rx="2"/>
    <rect x="16" y="70" width="12" height="6" fill="#1F2937" rx="2"/>
    <!-- Body -->
    <rect x="0" y="15" width="30" height="34" fill="#1E40AF" rx="5"/>
    <!-- Arms -->
    <rect x="-6" y="18" width="8" height="22" fill="#2563EB" rx="4"/>
    <rect x="28" y="18" width="8" height="22" fill="#2563EB" rx="4"/>
    <!-- Waving arm -->
    <rect x="28" y="8" width="8" height="22" fill="#2563EB" rx="4" transform="rotate(-30 32 20)"/>
    <!-- Head -->
    <circle cx="15" cy="4" r="13" fill="#FBBF24"/>
    <!-- Face -->
    <circle cx="10" cy="2" r="1.5" fill="#1E3A5F"/>
    <circle cx="20" cy="2" r="1.5" fill="#1E3A5F"/>
    <path d="M10 8 Q15 13 20 8" fill="none" stroke="#1E3A5F" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Hair -->
    <path d="M3,-2 Q3,-10 15,-12 Q27,-10 27,-2" fill="#5B3A1E"/>
  </g>
  <!-- Mom -->
  <g transform="translate(195, 183)">
    <!-- Legs (dress covers) -->
    <rect x="6" y="52" width="7" height="18" fill="#374151" rx="3"/>
    <rect x="17" y="52" width="7" height="18" fill="#374151" rx="3"/>
    <rect x="4" y="67" width="10" height="5" fill="#1F2937" rx="2"/>
    <rect x="16" y="67" width="10" height="5" fill="#1F2937" rx="2"/>
    <!-- Body/dress -->
    <path d="M3,15 L3,55 Q15,52 27,55 L27,15 Z" fill="#059669" rx="5"/>
    <rect x="3" y="15" width="24" height="25" fill="#059669" rx="5"/>
    <!-- Arms -->
    <rect x="-4" y="18" width="8" height="20" fill="#10B981" rx="4"/>
    <rect x="26" y="18" width="8" height="20" fill="#10B981" rx="4"/>
    <!-- Head -->
    <circle cx="15" cy="4" r="12" fill="#D2691E"/>
    <!-- Face -->
    <circle cx="10" cy="2" r="1.5" fill="#1E3A5F"/>
    <circle cx="20" cy="2" r="1.5" fill="#1E3A5F"/>
    <path d="M10 8 Q15 12 20 8" fill="none" stroke="#1E3A5F" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Hair -->
    <path d="M3,0 Q3,-10 15,-12 Q27,-10 27,0" fill="#5B3A1E"/>
    <ellipse cx="3" cy="4" rx="3" ry="8" fill="#5B3A1E"/>
    <ellipse cx="27" cy="4" rx="3" ry="8" fill="#5B3A1E"/>
  </g>
  <!-- Child -->
  <g transform="translate(228, 207)">
    <!-- Legs -->
    <rect x="3" y="25" width="6" height="18" fill="#1E40AF" rx="3"/>
    <rect x="14" y="25" width="6" height="18" fill="#1E40AF" rx="3"/>
    <rect x="1" y="40" width="10" height="5" fill="#1F2937" rx="2"/>
    <rect x="12" y="40" width="10" height="5" fill="#1F2937" rx="2"/>
    <!-- Body -->
    <rect x="0" y="5" width="22" height="22" fill="#F59E0B" rx="4"/>
    <!-- Arms raised -->
    <rect x="-5" y="0" width="7" height="18" fill="#FBBF24" rx="3" transform="rotate(20 -1 10)"/>
    <rect x="20" y="0" width="7" height="18" fill="#FBBF24" rx="3" transform="rotate(-20 24 10)"/>
    <!-- Head -->
    <circle cx="11" cy="-4" r="10" fill="#FBBF24"/>
    <!-- Face -->
    <circle cx="7" cy="-5" r="1.5" fill="#1E3A5F"/>
    <circle cx="15" cy="-5" r="1.5" fill="#1E3A5F"/>
    <path d="M7 1 Q11 5 15 1" fill="none" stroke="#1E3A5F" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Hair -->
    <path d="M2,-8 Q2,-14 11,-15 Q20,-14 20,-8" fill="#5B3A1E"/>
  </g>
  <!-- Hearts / joy symbols -->
  <g fill="#EF4444" opacity="0.6">
    <path d="M170,170 Q170,165 175,165 Q180,165 180,170 Q180,165 185,165 Q190,165 190,170 Q190,178 180,183 Q170,178 170,170" transform="scale(0.5) translate(290, 300)"/>
    <path d="M170,170 Q170,165 175,165 Q180,165 180,170 Q180,165 185,165 Q190,165 190,170 Q190,178 180,183 Q170,178 170,170" transform="scale(0.4) translate(600, 390)"/>
  </g>
  <!-- Flowers in grass -->
  <g>
    <circle cx="50" cy="240" r="4" fill="#F472B6" opacity="0.7"/>
    <circle cx="50" cy="240" r="1.5" fill="#FBBF24"/>
    <circle cx="350" cy="235" r="4" fill="#FCD34D" opacity="0.7"/>
    <circle cx="350" cy="235" r="1.5" fill="white"/>
    <circle cx="80" cy="250" r="3" fill="#A78BFA" opacity="0.6"/>
    <circle cx="370" cy="250" r="3" fill="#F472B6" opacity="0.6"/>
  </g>
  <!-- Fence -->
  <g fill="#A87D52" opacity="0.4">
    <rect x="10" y="205" width="3" height="20" rx="1"/>
    <rect x="25" y="205" width="3" height="20" rx="1"/>
    <rect x="40" y="205" width="3" height="20" rx="1"/>
    <rect x="8" y="210" width="38" height="2" rx="1"/>
    <rect x="8" y="218" width="38" height="2" rx="1"/>
    <rect x="355" y="205" width="3" height="20" rx="1"/>
    <rect x="370" y="205" width="3" height="20" rx="1"/>
    <rect x="385" y="205" width="3" height="20" rx="1"/>
    <rect x="353" y="210" width="38" height="2" rx="1"/>
    <rect x="353" y="218" width="38" height="2" rx="1"/>
  </g>
</svg>