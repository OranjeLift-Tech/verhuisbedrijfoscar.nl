<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="g1sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="g1truck" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="g1road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="300" fill="url(#g1sky)" rx="8"/>
  <!-- Clouds -->
  <g fill="white" opacity="0.7">
    <ellipse cx="80" cy="50" rx="40" ry="18"/>
    <ellipse cx="60" cy="45" rx="25" ry="14"/>
    <ellipse cx="105" cy="48" rx="28" ry="12"/>
    <ellipse cx="300" cy="35" rx="35" ry="16"/>
    <ellipse cx="280" cy="30" rx="22" ry="12"/>
    <ellipse cx="325" cy="32" rx="24" ry="11"/>
  </g>
  <!-- City skyline background -->
  <g fill="#93C5FD" opacity="0.5">
    <rect x="10" y="110" width="30" height="90" rx="2"/>
    <rect x="35" y="130" width="22" height="70" rx="2"/>
    <rect x="55" y="100" width="25" height="100" rx="2"/>
    <rect x="78" y="140" width="20" height="60" rx="2"/>
    <rect x="280" y="120" width="28" height="80" rx="2"/>
    <rect x="305" y="105" width="22" height="95" rx="2"/>
    <rect x="325" y="135" width="30" height="65" rx="2"/>
    <rect x="355" y="115" width="25" height="85" rx="2"/>
    <rect x="378" y="130" width="22" height="70" rx="2"/>
  </g>
  <!-- Trees -->
  <g>
    <rect x="115" y="155" width="8" height="30" fill="#92400E" rx="2"/>
    <circle cx="119" cy="148" r="18" fill="#059669" opacity="0.7"/>
    <circle cx="110" cy="155" r="12" fill="#10B981" opacity="0.6"/>
    <rect x="350" y="158" width="7" height="28" fill="#92400E" rx="2"/>
    <circle cx="353" cy="150" r="16" fill="#059669" opacity="0.7"/>
  </g>
  <!-- Road -->
  <rect x="0" y="200" width="400" height="100" fill="url(#g1road)" rx="0"/>
  <!-- Road line markings -->
  <g fill="#FCD34D" opacity="0.8">
    <rect x="20" y="245" width="40" height="4" rx="2"/>
    <rect x="90" y="245" width="40" height="4" rx="2"/>
    <rect x="160" y="245" width="40" height="4" rx="2"/>
    <rect x="230" y="245" width="40" height="4" rx="2"/>
    <rect x="300" y="245" width="40" height="4" rx="2"/>
    <rect x="370" y="245" width="30" height="4" rx="2"/>
  </g>
  <!-- Sidewalk -->
  <rect x="0" y="195" width="400" height="10" fill="#D1D5DB"/>
  <!-- Moving truck -->
  <g transform="translate(80, 145)">
    <!-- Cargo box -->
    <rect x="0" y="10" width="160" height="90" fill="url(#g1truck)" rx="6"/>
    <!-- Cargo box details -->
    <rect x="8" y="18" width="144" height="74" fill="#1E40AF" rx="3" stroke="#2563EB" stroke-width="1"/>
    <!-- Roll-up door lines -->
    <line x1="20" y1="30" x2="140" y2="30" stroke="#3B82F6" stroke-width="0.8" opacity="0.5"/>
    <line x1="20" y1="42" x2="140" y2="42" stroke="#3B82F6" stroke-width="0.8" opacity="0.5"/>
    <line x1="20" y1="54" x2="140" y2="54" stroke="#3B82F6" stroke-width="0.8" opacity="0.5"/>
    <line x1="20" y1="66" x2="140" y2="66" stroke="#3B82F6" stroke-width="0.8" opacity="0.5"/>
    <line x1="20" y1="78" x2="140" y2="78" stroke="#3B82F6" stroke-width="0.8" opacity="0.5"/>
    <!-- Green accent stripe -->
    <rect x="0" y="70" width="160" height="8" fill="#059669" rx="0"/>
    <!-- Company name on truck -->
    <text x="80" y="58" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold" text-anchor="middle">OSCAR</text>
    <!-- Cab -->
    <rect x="160" y="30" width="70" height="70" fill="url(#g1truck)" rx="6"/>
    <!-- Windshield -->
    <rect x="170" y="38" width="50" height="32" fill="#BFDBFE" rx="4"/>
    <rect x="170" y="38" width="50" height="32" fill="none" stroke="#1E3A8A" stroke-width="1.5" rx="4"/>
    <!-- Windshield reflection -->
    <line x1="200" y1="40" x2="210" y2="68" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <!-- Door -->
    <rect x="175" y="72" width="40" height="28" fill="#1E3A8A" rx="2"/>
    <!-- Door handle -->
    <rect x="205" y="82" width="8" height="3" fill="#93C5FD" rx="1"/>
    <!-- Headlight -->
    <rect x="224" y="75" width="8" height="6" fill="#FCD34D" rx="2"/>
    <!-- Bumper -->
    <rect x="158" y="98" width="76" height="6" fill="#6B7280" rx="2"/>
    <!-- Wheels -->
    <circle cx="40" cy="104" r="16" fill="#1F2937"/>
    <circle cx="40" cy="104" r="8" fill="#6B7280"/>
    <circle cx="40" cy="104" r="3" fill="#9CA3AF"/>
    <circle cx="120" cy="104" r="16" fill="#1F2937"/>
    <circle cx="120" cy="104" r="8" fill="#6B7280"/>
    <circle cx="120" cy="104" r="3" fill="#9CA3AF"/>
    <circle cx="200" cy="104" r="16" fill="#1F2937"/>
    <circle cx="200" cy="104" r="8" fill="#6B7280"/>
    <circle cx="200" cy="104" r="3" fill="#9CA3AF"/>
    <!-- Mud flaps -->
    <rect x="54" y="104" width="4" height="14" fill="#1F2937" rx="1"/>
    <rect x="134" y="104" width="4" height="14" fill="#1F2937" rx="1"/>
  </g>
  <!-- Sun -->
  <circle cx="350" cy="40" r="22" fill="#FCD34D" opacity="0.8"/>
  <circle cx="350" cy="40" r="18" fill="#FBBF24"/>
</svg>