<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="szBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#szBg)"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- Office building -->
  <g transform="translate(50, 50)" fill="white">
    <!-- Main building -->
    <rect x="-16" y="-22" width="32" height="44" rx="2" opacity="0.95"/>
    <!-- Left wing -->
    <rect x="-24" y="-10" width="12" height="32" rx="2" opacity="0.85"/>
    <!-- Right wing -->
    <rect x="12" y="-10" width="12" height="32" rx="2" opacity="0.85"/>
    <!-- Windows - main building -->
    <g fill="#93C5FD" opacity="0.7">
      <!-- Row 1 -->
      <rect x="-12" y="-18" width="6" height="5" rx="0.5"/>
      <rect x="-3" y="-18" width="6" height="5" rx="0.5"/>
      <rect x="6" y="-18" width="6" height="5" rx="0.5"/>
      <!-- Row 2 -->
      <rect x="-12" y="-10" width="6" height="5" rx="0.5"/>
      <rect x="-3" y="-10" width="6" height="5" rx="0.5"/>
      <rect x="6" y="-10" width="6" height="5" rx="0.5"/>
      <!-- Row 3 -->
      <rect x="-12" y="-2" width="6" height="5" rx="0.5"/>
      <rect x="-3" y="-2" width="6" height="5" rx="0.5"/>
      <rect x="6" y="-2" width="6" height="5" rx="0.5"/>
      <!-- Row 4 -->
      <rect x="-12" y="6" width="6" height="5" rx="0.5"/>
      <rect x="-3" y="6" width="6" height="5" rx="0.5"/>
      <rect x="6" y="6" width="6" height="5" rx="0.5"/>
    </g>
    <!-- Windows - left wing -->
    <g fill="#93C5FD" opacity="0.6">
      <rect x="-22" y="-6" width="5" height="4" rx="0.5"/>
      <rect x="-15" y="-6" width="5" height="4" rx="0.5"/>
      <rect x="-22" y="1" width="5" height="4" rx="0.5"/>
      <rect x="-15" y="1" width="5" height="4" rx="0.5"/>
      <rect x="-22" y="8" width="5" height="4" rx="0.5"/>
      <rect x="-15" y="8" width="5" height="4" rx="0.5"/>
    </g>
    <!-- Windows - right wing -->
    <g fill="#93C5FD" opacity="0.6">
      <rect x="14" y="-6" width="5" height="4" rx="0.5"/>
      <rect x="21" y="-6" width="5" height="4" rx="0.5"/>
      <rect x="14" y="1" width="5" height="4" rx="0.5"/>
      <rect x="21" y="1" width="5" height="4" rx="0.5"/>
      <rect x="14" y="8" width="5" height="4" rx="0.5"/>
      <rect x="21" y="8" width="5" height="4" rx="0.5"/>
    </g>
    <!-- Entrance door -->
    <rect x="-4" y="14" width="8" height="10" rx="1" fill="#1E40AF"/>
    <rect x="-1" y="14" width="2" height="10" fill="#2563EB" opacity="0.5"/>
    <!-- Roof antenna/spire -->
    <rect x="-1" y="-27" width="2" height="6" fill="white" opacity="0.8"/>
    <circle cx="0" cy="-28" r="2" fill="#10B981"/>
  </g>
</svg>