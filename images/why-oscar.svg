<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#F0FDF4"/>
    </linearGradient>
    <linearGradient id="shirtBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#skyGrad)" rx="12"/>
  <!-- Floor -->
  <rect x="0" y="320" width="600" height="80" fill="url(#floorGrad)" rx="0"/>
  <rect x="0" y="320" width="600" height="8" fill="#10B981" opacity="0.5"/>
  <!-- Background elements: simple house outline -->
  <g opacity="0.15">
    <rect x="420" y="180" width="120" height="140" fill="#1E40AF" rx="4"/>
    <polygon points="410,180 480,120 550,180" fill="#1E40AF"/>
    <rect x="450" y="240" width="30" height="40" fill="#E0F2FE" rx="2"/>
    <rect x="500" y="220" width="25" height="25" fill="#E0F2FE" rx="2"/>
  </g>
  <!-- Mover 1 (left, carrying big box) -->
  <g transform="translate(140, 140)">
    <!-- Legs -->
    <rect x="8" y="110" width="14" height="55" fill="#1E3A5F" rx="4"/>
    <rect x="30" y="110" width="14" height="55" fill="#1E3A5F" rx="4"/>
    <!-- Shoes -->
    <rect x="5" y="158" width="20" height="10" fill="#374151" rx="4"/>
    <rect x="27" y="158" width="20" height="10" fill="#374151" rx="4"/>
    <!-- Body/shirt -->
    <rect x="2" y="50" width="48" height="65" fill="url(#shirtBlue)" rx="8"/>
    <!-- Arms holding box -->
    <rect x="-10" y="55" width="16" height="50" fill="#1E40AF" rx="6"/>
    <rect x="46" y="55" width="16" height="50" fill="#1E40AF" rx="6"/>
    <!-- Head -->
    <circle cx="26" cy="32" r="22" fill="#FBBF24"/>
    <!-- Face -->
    <circle cx="18" cy="28" r="2.5" fill="#1E3A5F"/>
    <circle cx="34" cy="28" r="2.5" fill="#1E3A5F"/>
    <path d="M18 38 Q26 44 34 38" fill="none" stroke="#1E3A5F" stroke-width="2" stroke-linecap="round"/>
    <!-- Cap -->
    <rect x="6" y="14" width="40" height="14" fill="#059669" rx="6"/>
    <rect x="2" y="24" width="48" height="5" fill="#059669" rx="2"/>
    <!-- Big box being carried -->
    <rect x="-20" y="52" width="92" height="60" fill="url(#boxGrad)" rx="4"/>
    <line x1="-5" y1="70" x2="25" y2="70" stroke="#92400E" stroke-width="1.5" opacity="0.4"/>
    <line x1="-5" y1="82" x2="25" y2="82" stroke="#92400E" stroke-width="1.5" opacity="0.4"/>
    <text x="45" y="88" font-family="Arial, sans-serif" font-size="11" fill="#92400E" font-weight="bold">OSCAR</text>
  </g>
  <!-- Mover 2 (right, carrying stacked boxes) -->
  <g transform="translate(310, 155)">
    <!-- Legs (walking pose) -->
    <rect x="10" y="100" width="14" height="50" fill="#1E3A5F" rx="4" transform="rotate(-8 17 125)"/>
    <rect x="30" y="100" width="14" height="50" fill="#1E3A5F" rx="4" transform="rotate(8 37 125)"/>
    <!-- Shoes -->
    <rect x="2" y="145" width="20" height="10" fill="#374151" rx="4"/>
    <rect x="32" y="145" width="20" height="10" fill="#374151" rx="4"/>
    <!-- Body/shirt -->
    <rect x="4" y="42" width="46" height="62" fill="url(#shirtBlue)" rx="8"/>
    <!-- Arms up holding boxes -->
    <rect x="-6" y="20" width="14" height="45" fill="#1E40AF" rx="6"/>
    <rect x="46" y="20" width="14" height="45" fill="#1E40AF" rx="6"/>
    <!-- Head -->
    <circle cx="27" cy="24" r="21" fill="#D2691E"/>
    <!-- Face -->
    <circle cx="20" cy="20" r="2.5" fill="#1E3A5F"/>
    <circle cx="34" cy="20" r="2.5" fill="#1E3A5F"/>
    <path d="M20 30 Q27 36 34 30" fill="none" stroke="#1E3A5F" stroke-width="2" stroke-linecap="round"/>
    <!-- Cap -->
    <rect x="8" y="6" width="38" height="14" fill="#059669" rx="6"/>
    <rect x="4" y="16" width="46" height="5" fill="#059669" rx="2"/>
    <!-- Stacked boxes on top -->
    <rect x="-12" y="-30" width="78" height="48" fill="url(#boxGrad)" rx="4"/>
    <line x1="27" y1="-30" x2="27" y2="18" stroke="#92400E" stroke-width="1" opacity="0.3"/>
    <line x1="-12" y1="-6" x2="66" y2="-6" stroke="#92400E" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Small boxes on ground -->
  <rect x="60" y="290" width="45" height="35" fill="#D97706" rx="3"/>
  <text x="68" y="312" font-family="Arial, sans-serif" font-size="8" fill="#92400E">FRAGILE</text>
  <rect x="250" y="295" width="35" height="30" fill="#F59E0B" rx="3"/>
  <!-- Dolly/hand truck -->
  <g transform="translate(490, 250)">
    <rect x="0" y="0" width="8" height="65" fill="#6B7280" rx="2"/>
    <rect x="-10" y="60" width="40" height="6" fill="#6B7280" rx="2"/>
    <circle cx="-6" cy="70" r="7" fill="#374151"/>
    <circle cx="-6" cy="70" r="3" fill="#6B7280"/>
    <circle cx="26" cy="70" r="7" fill="#374151"/>
    <circle cx="26" cy="70" r="3" fill="#6B7280"/>
    <!-- Box on dolly -->
    <rect x="-8" y="20" width="36" height="38" fill="url(#boxGrad)" rx="3"/>
  </g>
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="20" fill="#1E40AF" opacity="0.08"/>
  <circle cx="520" cy="80" r="30" fill="#059669" opacity="0.08"/>
  <circle cx="300" cy="50" r="15" fill="#1E40AF" opacity="0.06"/>
</svg>