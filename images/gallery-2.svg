<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="g2wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="g2floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D2B48C"/>
      <stop offset="100%" stop-color="#BC8F5F"/>
    </linearGradient>
    <linearGradient id="g2box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <!-- Room background -->
  <rect width="400" height="300" fill="url(#g2wall)" rx="8"/>
  <!-- Floor -->
  <rect x="0" y="220" width="400" height="80" fill="url(#g2floor)"/>
  <!-- Floor boards -->
  <line x1="0" y1="240" x2="400" y2="240" stroke="#A87D52" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="260" x2="400" y2="260" stroke="#A87D52" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="280" x2="400" y2="280" stroke="#A87D52" stroke-width="0.5" opacity="0.4"/>
  <!-- Window -->
  <rect x="260" y="30" width="100" height="80" fill="#BFDBFE" rx="4" stroke="#A87D52" stroke-width="3"/>
  <line x1="310" y1="30" x2="310" y2="110" stroke="#A87D52" stroke-width="2"/>
  <line x1="260" y1="70" x2="360" y2="70" stroke="#A87D52" stroke-width="2"/>
  <!-- Curtains -->
  <path d="M258,28 Q270,70 258,112" fill="none" stroke="#059669" stroke-width="4" opacity="0.5"/>
  <path d="M362,28 Q350,70 362,112" fill="none" stroke="#059669" stroke-width="4" opacity="0.5"/>
  <!-- Sunlight from window -->
  <polygon points="260,110 360,110 400,220 200,220" fill="#FCD34D" opacity="0.08"/>
  <!-- Wall decoration - simple framed picture -->
  <rect x="50" y="40" width="60" height="45" fill="#E5E7EB" rx="2" stroke="#A87D52" stroke-width="2"/>
  <rect x="56" y="46" width="48" height="33" fill="#BFDBFE" rx="1"/>
  <polygon points="60,79 80,60 95,72 104,65 104,79" fill="#059669" opacity="0.5"/>
  <circle cx="92" cy="54" r="5" fill="#FCD34D" opacity="0.6"/>
  <!-- Boxes scattered around -->
  <!-- Open box left -->
  <g transform="translate(30, 155)">
    <rect x="0" y="0" width="55" height="45" fill="url(#g2box)" rx="3"/>
    <!-- Open flaps -->
    <polygon points="0,0 -5,-12 20,-10 27,0" fill="#F59E0B"/>
    <polygon points="55,0 60,-12 35,-10 28,0" fill="#D97706"/>
    <!-- Items peeking out -->
    <rect x="10" y="-8" width="12" height="12" fill="#3B82F6" rx="2" transform="rotate(-10 16 -2)"/>
    <circle cx="38" cy="-4" r="7" fill="#059669" opacity="0.7"/>
  </g>
  <!-- Closed box center -->
  <rect x="170" y="175" width="50" height="40" fill="url(#g2box)" rx="3"/>
  <line x1="170" y1="185" x2="220" y2="185" stroke="#92400E" stroke-width="1" opacity="0.4"/>
  <text x="180" y="205" font-family="Arial, sans-serif" font-size="7" fill="#92400E">KEUKEN</text>
  <!-- Small box -->
  <rect x="320" y="190" width="35" height="28" fill="#F59E0B" rx="3"/>
  <line x1="337" y1="190" x2="337" y2="218" stroke="#D97706" stroke-width="1" opacity="0.5"/>
  <!-- Person 1 - woman unpacking -->
  <g transform="translate(100, 100)">
    <!-- Legs (kneeling) -->
    <rect x="5" y="85" width="12" height="30" fill="#1E40AF" rx="4"/>
    <rect x="22" y="95" width="30" height="12" fill="#1E40AF" rx="4"/>
    <!-- Shoes -->
    <rect x="2" y="110" width="16" height="8" fill="#374151" rx="3"/>
    <rect x="44" y="102" width="12" height="8" fill="#374151" rx="3"/>
    <!-- Body -->
    <rect x="5" y="40" width="38" height="50" fill="#059669" rx="6"/>
    <!-- Arms (reaching into box) -->
    <rect x="-5" y="50" width="12" height="38" fill="#10B981" rx="5" transform="rotate(20 1 50)"/>
    <rect x="35" y="48" width="12" height="35" fill="#10B981" rx="5" transform="rotate(-15 41 48)"/>
    <!-- Head -->
    <circle cx="24" cy="24" r="18" fill="#FBBF24"/>
    <!-- Hair -->
    <path d="M8,18 Q6,5 24,4 Q42,5 40,18" fill="#92400E" stroke="none"/>
    <ellipse cx="8" cy="22" rx="4" ry="8" fill="#92400E"/>
    <ellipse cx="40" cy="22" rx="4" ry="8" fill="#92400E"/>
    <!-- Face -->
    <circle cx="17" cy="22" r="2" fill="#1E3A5F"/>
    <circle cx="31" cy="22" r="2" fill="#1E3A5F"/>
    <path d="M17 30 Q24 36 31 30" fill="none" stroke="#1E3A5F" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Person 2 - man carrying items -->
  <g transform="translate(240, 108)">
    <!-- Legs -->
    <rect x="8" y="80" width="12" height="40" fill="#374151" rx="4"/>
    <rect x="28" y="80" width="12" height="40" fill="#374151" rx="4"/>
    <!-- Shoes -->
    <rect x="5" y="115" width="18" height="8" fill="#1F2937" rx="3"/>
    <rect x="25" y="115" width="18" height="8" fill="#1F2937" rx="3"/>
    <!-- Body -->
    <rect x="2" y="30" width="44" height="55" fill="#1E40AF" rx="6"/>
    <!-- Arms holding stack of plates -->
    <rect x="-8" y="38" width="12" height="40" fill="#2563EB" rx="5"/>
    <rect x="44" y="38" width="12" height="40" fill="#2563EB" rx="5"/>
    <!-- Stack of plates/items -->
    <rect x="-12" y="32" width="72" height="12" fill="#E5E7EB" rx="3"/>
    <rect x="-8" y="24" width="64" height="10" fill="#F3F4F6" rx="3"/>
    <rect x="-4" y="17" width="56" height="9" fill="white" rx="3"/>
    <!-- Head -->
    <circle cx="24" cy="12" r="18" fill="#D2691E"/>
    <!-- Face -->
    <circle cx="17" cy="9" r="2" fill="#1E3A5F"/>
    <circle cx="31" cy="9" r="2" fill="#1E3A5F"/>
    <path d="M17 18 Q24 23 31 18" fill="none" stroke="#1E3A5F" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Short hair -->
    <path d="M6,6 Q6,-6 24,-8 Q42,-6 42,6" fill="#5B3A1E"/>
  </g>
  <!-- Plant in corner -->
  <g transform="translate(360, 170)">
    <rect x="5" y="30" width="24" height="22" fill="#059669" rx="4"/>
    <rect x="8" y="28" width="18" height="4" fill="#10B981" rx="2"/>
    <line x1="17" y1="28" x2="17" y2="10" stroke="#059669" stroke-width="2"/>
    <ellipse cx="10" cy="12" rx="8" ry="6" fill="#10B981"/>
    <ellipse cx="24" cy="14" rx="7" ry="5" fill="#059669"/>
    <ellipse cx="17" cy="8" rx="6" ry="5" fill="#34D399"/>
  </g>
  <!-- Decorative tape on floor -->
  <rect x="130" y="218" width="60" height="3" fill="#FCD34D" rx="1" opacity="0.6"/>
</svg>