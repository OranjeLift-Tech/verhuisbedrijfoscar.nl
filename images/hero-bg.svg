<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="accent2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.2"/>
    </linearGradient>
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="white" opacity="0.08"/>
    </pattern>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base background -->
  <rect width="1920" height="800" fill="url(#bgGrad)"/>
  <!-- Radial glows -->
  <rect width="1920" height="800" fill="url(#glow1)"/>
  <rect width="1920" height="800" fill="url(#glow2)"/>
  <!-- Large geometric shapes -->
  <polygon points="0,800 400,400 800,800" fill="#1E40AF" opacity="0.1"/>
  <polygon points="300,0 700,500 100,500" fill="#059669" opacity="0.07"/>
  <polygon points="1200,0 1920,300 1920,0" fill="#1E40AF" opacity="0.12"/>
  <polygon points="1400,800 1700,400 1920,600 1920,800" fill="#059669" opacity="0.08"/>
  <polygon points="600,0 900,250 750,500 450,300" fill="#1E40AF" opacity="0.06"/>
  <polygon points="1000,200 1300,100 1400,400 1100,500" fill="#059669" opacity="0.05"/>
  <!-- Overlapping rectangles rotated -->
  <rect x="150" y="100" width="350" height="250" rx="8" fill="#1E40AF" opacity="0.08" transform="rotate(-12 325 225)"/>
  <rect x="1400" y="200" width="400" height="280" rx="8" fill="#059669" opacity="0.06" transform="rotate(8 1600 340)"/>
  <rect x="800" y="400" width="300" height="200" rx="8" fill="#1E40AF" opacity="0.07" transform="rotate(-5 950 500)"/>
  <!-- Circle decorations -->
  <circle cx="250" cy="600" r="180" fill="none" stroke="#1E40AF" stroke-width="1.5" opacity="0.12"/>
  <circle cx="250" cy="600" r="130" fill="none" stroke="#059669" stroke-width="1" opacity="0.08"/>
  <circle cx="1650" cy="200" r="220" fill="none" stroke="#1E40AF" stroke-width="1.5" opacity="0.1"/>
  <circle cx="1650" cy="200" r="160" fill="none" stroke="#059669" stroke-width="1" opacity="0.07"/>
  <circle cx="960" cy="400" r="280" fill="none" stroke="#1E40AF" stroke-width="1" opacity="0.06"/>
  <!-- Diagonal lines -->
  <line x1="0" y1="600" x2="500" y2="200" stroke="#1E40AF" stroke-width="1" opacity="0.08"/>
  <line x1="1400" y1="0" x2="1920" y2="500" stroke="#059669" stroke-width="1" opacity="0.08"/>
  <line x1="700" y1="800" x2="1200" y2="0" stroke="#1E40AF" stroke-width="0.8" opacity="0.05"/>
  <!-- Small diamond shapes -->
  <polygon points="500,150 520,170 500,190 480,170" fill="#059669" opacity="0.2"/>
  <polygon points="1100,650 1120,670 1100,690 1080,670" fill="#1E40AF" opacity="0.2"/>
  <polygon points="1500,550 1520,570 1500,590 1480,570" fill="#059669" opacity="0.15"/>
  <polygon points="350,450 370,470 350,490 330,470" fill="#1E40AF" opacity="0.15"/>
  <polygon points="800,100 820,120 800,140 780,120" fill="#059669" opacity="0.18"/>
  <polygon points="1700,700 1720,720 1700,740 1680,720" fill="#1E40AF" opacity="0.18"/>
  <!-- Dot grid overlay -->
  <rect width="1920" height="800" fill="url(#dotGrid)"/>
  <!-- Subtle top/bottom fade for content blending -->
  <rect width="1920" height="120" fill="url(#bgGrad)" opacity="0.5" y="0">
    <animate attributeName="opacity" values="0.5;0.3;0.5" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>